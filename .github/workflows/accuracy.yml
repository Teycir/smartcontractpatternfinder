name: Accuracy & Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  accuracy-test:
    name: Accuracy Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Run Accuracy Tests
        run: |
          cargo test --release -p scpf-cli --test accuracy_tests
          
      - name: Generate Accuracy Report
        run: |
          cargo run --release -p scpf-cli --bin accuracy_report > accuracy_report.txt
          cat accuracy_report.txt
          
      - name: Check F1 Score Threshold
        run: |
          F1=$(grep "F1 Score" accuracy_report.txt | awk '{print $3}' | tr -d '%')
          if [ -z "$F1" ]; then
            echo "❌ Failed to parse F1 score from accuracy report"
            exit 1
          fi
          echo "F1 Score: $F1%"
          if (( $(echo "$F1 < 80.0" | bc -l) )); then
            echo "::warning::F1 score $F1% below threshold 80%. Benchmark corpus needs refresh before this can be a blocking gate."
          else
            echo "✅ F1 score $F1% meets threshold"
          fi
          
      - name: Upload Accuracy Report
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-report
          path: accuracy_report.txt

  security-scan:
    name: SARIF Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Build SCPF
        run: cargo build --release -p scpf-cli --bin benchmark_sarif
      
      - name: Scan Benchmarks
        run: |
          ./target/release/benchmark_sarif > scpf-results.sarif
          
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scpf-results.sarif
          category: scpf-security-scan
