id: delegatecall-user-input
name: Delegatecall to User-Controlled Address
description: |
  Using delegatecall with a user-supplied address can allow the attacker to execute 
  arbitrary code in the context of the contract (including selfdestruct).
severity: critical
tags:
  - security
  - delegatecall
  - SWC-112
patterns:
  - id: delegatecall-to-input
    pattern: '\.delegatecall\s*\('
    message: "Delegatecall usage detected. Ensure the target address and data are trusted."
    kind: regex
