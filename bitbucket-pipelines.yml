# Bitbucket Pipelines Configuration for SCPF
# Add this to your bitbucket-pipelines.yml file

image: rust:latest

definitions:
  caches:
    cargo: ~/.cargo
    scpf-target: target/

pipelines:
  default:
    - step:
        name: SCPF Security Scan
        caches:
          - cargo
          - scpf-target
        script:
          - command -v scpf &> /dev/null || cargo install scpf-cli
          - if ! scpf scan --output json > scpf-results.json; then echo "Error: JSON scan failed" >&2; exit 1; fi
          - if ! scpf scan --output sarif > scpf-results.sarif; then echo "Error: SARIF scan failed" >&2; exit 1; fi
        artifacts:
          - scpf-results.json
          - scpf-results.sarif

  pull-requests:
    '**':
      - step:
          name: SCPF Diff Scan
          caches:
            - cargo
          script:
            - command -v scpf &> /dev/null || cargo install scpf-cli || { echo "Error: Failed to install scpf-cli"; exit 1; }
            - scpf scan --diff origin/$BITBUCKET_PR_DESTINATION_BRANCH..HEAD || { echo "Error: Diff scan failed"; exit 1; }
            - scpf scan --output sarif > scpf-results.sarif || { echo "Error: SARIF scan failed"; exit 1; }
          artifacts:
            - scpf-results.sarif

  branches:
    main:
      - step:
          name: SCPF Full Scan
          caches:
            - cargo
            - scpf-target
          script:
            - command -v scpf &> /dev/null || cargo install scpf-cli || { echo "Error: Failed to install scpf-cli"; exit 1; }
            - scpf scan --output json > scpf-results.json || { echo "Error: JSON scan failed"; exit 1; }
            - scpf scan --output sarif > scpf-results.sarif || { echo "Error: SARIF scan failed"; exit 1; }
          artifacts:
            - scpf-results.json
            - scpf-results.sarif

  custom:
    blockchain-scan:
      - variables:
          - name: CONTRACT_ADDRESS
          - name: CHAIN
            default: ethereum
      - step:
          name: Scan Blockchain Contract
          caches:
            - cargo
          script:
            - command -v scpf &> /dev/null || cargo install scpf-cli || { echo "Error: Failed to install scpf-cli" >&2; exit 1; }
            - scpf scan $CONTRACT_ADDRESS --chain $CHAIN --output json || { echo "Error: Blockchain scan failed" >&2; exit 1; }
