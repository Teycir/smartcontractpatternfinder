name: 'SCPF Security Scanner'
description: 'Scan smart contracts for security vulnerabilities using SCPF'
author: 'Teycir Ben Soltane'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  severity:
    description: 'Minimum severity to fail the build (info, low, medium, high, critical)'
    required: false
    default: 'high'
    type: choice
    options:
      - info
      - low
      - medium
      - high
      - critical
  templates:
    description: 'Path to custom templates directory'
    required: false
    default: 'templates'
    type: string
  output-format:
    description: 'Output format (console, json, sarif)'
    required: false
    default: 'sarif'
  fail-on-findings:
    description: 'Fail the build if vulnerabilities are found'
    required: false
    default: 'true'

outputs:
  findings-count:
    description: 'Number of vulnerabilities found'
    value: ${{ steps.scan.outputs.findings }}
  sarif-file:
    description: 'Path to SARIF output file'
    value: ${{ steps.scan.outputs.sarif }}

runs:
  using: 'composite'
  steps:
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache SCPF
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/scpf
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-scpf-${{ hashFiles('**/Cargo.lock') || 'no-lock' }}
        restore-keys: |
          ${{ runner.os }}-scpf-
        
    - name: Install SCPF
      shell: bash
      run: |
        if ! command -v scpf &> /dev/null; then
          cargo install --git https://github.com/Teycir/smartcontractpatternfinder scpf-cli
        fi
        
    - name: Run SCPF Scan
      id: scan
      shell: bash
      run: |
        set +e
        if ! scpf scan --output ${{ inputs.output-format }} --templates ${{ inputs.templates }} > scpf-results.sarif 2>&1; then
          echo "::warning::SCPF scan command encountered issues"
        fi
        EXIT_CODE=$?
        
        if [ -f scpf-results.sarif ]; then
          if ! FINDINGS=$(jq '[.runs[].results | length] | add' scpf-results.sarif 2>/dev/null); then
            echo "::warning::Failed to parse SARIF file, defaulting to 0 findings"
            FINDINGS="0"
          fi
          FINDINGS=${FINDINGS:-0}
          echo "findings=$FINDINGS" >> $GITHUB_OUTPUT
          echo "sarif=scpf-results.sarif" >> $GITHUB_OUTPUT
          echo "Found $FINDINGS vulnerabilities"
        else
          echo "::error::Failed to generate SARIF output file"
          exit 1
        fi
        
        if [ "${{ inputs.fail-on-findings }}" = "true" ] && [ $EXIT_CODE -ne 0 ]; then
          echo "::error::Security vulnerabilities found!"
          exit 1
        fi
        
    - name: Validate SARIF File
      if: inputs.output-format == 'sarif'
      shell: bash
      run: |
        if [ ! -f scpf-results.sarif ]; then
          echo "::error::SARIF file not found for upload"
          exit 1
        fi
        if [ ! -s scpf-results.sarif ]; then
          echo "::warning::SARIF file is empty"
        fi
        
    - name: Upload SARIF
      if: inputs.output-format == 'sarif'
      id: upload-sarif
      uses: github/codeql-action/upload-sarif@v2
      continue-on-error: false
      with:
        sarif_file: ${{ github.workspace }}/scpf-results.sarif
        category: scpf-security
        wait-for-processing: true
        
    - name: Verify SARIF Upload
      if: failure() && inputs.output-format == 'sarif'
      shell: bash
      run: |
        echo "::error::Failed to upload SARIF results to GitHub Security"
        exit 1
