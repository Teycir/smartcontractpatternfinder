id: unchecked-return-value-v5
name: Unchecked Low-Level Call Return Value
description: |
  Detects unchecked low-level calls where return value is ignored or declared but not checked.
  Includes (bool success,) = ... pattern where success is not subsequently verified.
severity: high
tags:
  - security
  - unchecked-return
  - SWC-104

patterns:
  - id: unchecked-call-statement
    kind: regex
    pattern: '^\s*(?!.*(?:bool|require|if|assert)).*\.(?:call|delegatecall)\s*[\({]'
    message: Unchecked low-level call - return value ignored

  - id: unchecked-send-statement
    kind: regex
    pattern: '^\s*(?!.*(?:require|if|assert))\w+\.send\([^)]+?\)\s*;'
    message: Unchecked .send() - return value ignored

  - id: declared-but-unchecked
    kind: regex
    pattern: '\(bool\s+\w+\s*,\s*\)\s*=.*\.call'
    message: Low-level call return declared but may not be checked - verify success is validated

  - id: arbitrary-call-with-data
    kind: regex
    pattern: '\.call\{value:\s*\w+\}\s*\(\s*\w*data\w*\s*\)'
    message: Low-level call with arbitrary data parameter - implement whitelist validation for target address
