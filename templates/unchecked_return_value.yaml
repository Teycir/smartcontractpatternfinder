id: unchecked-return-value-v4
name: Unchecked Low-Level Call Return Value
description: |
  Detects ONLY truly unchecked low-level calls where return value is ignored.
  Requires negative lookahead to ensure no checking is present.
severity: high
tags:
  - security
  - unchecked-return
  - SWC-104

patterns:
  # Only flag if call is NOT assigned and NOT in require/if
  - id: unchecked-call-statement
    pattern: '^\s*(?!.*(?:bool|require|if|assert)).*\.(?:call|delegatecall)\s*[\({]'
    message: "Unchecked low-level call - return value ignored"
    kind: regex

  - id: unchecked-send-statement  
    pattern: '^\s*(?!.*(?:require|if|assert))\w+\.send\([^)]+?\)\s*;'
    message: "Unchecked .send() - return value ignored"
    kind: regex
