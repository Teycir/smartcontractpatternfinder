id: zero-day-emerging
name: Zero-Day and Emerging Vulnerabilities
description: Latest exploit patterns from recent hacks and security research (Updated Monthly)
severity: critical
tags:
  - zero-day
  - emerging
  - cutting-edge
  - 2024-2025

patterns:
  # Read-only reentrancy (Curve Finance hack 2023)
  - id: readonly-reentrancy
    kind: semantic
    validate: true
    pattern: |
      (function_definition
        (state_mutability) @mut
        (function_body
          (statement
            (expression_statement
              (expression
                (call_expression
                  (expression
                    (member_expression))))))))
      (#match? @mut "^(view|pure)$")
    message: View function with external call - vulnerable to read-only reentrancy (Curve-style)
    required: true
    fallback: regex
    on_error: skip

  # ERC4626 inflation attack (2024)
  - id: erc4626-inflation
    kind: semantic
    pattern: |
      (function_definition
        (identifier) @name
        (function_body
          (statement
            (expression_statement
              (expression
                (call_expression
                  (expression
                    (member_expression
                      (identifier)
                      (identifier) @method))))))))
      (#match? @name "^(deposit|mint)$")
      (#eq? @method "totalSupply")
    message: ERC4626 vault without virtual shares - vulnerable to inflation attack
    on_error: skip
    on_error: skip

  # Permit front-running (2023-2024)
  - id: permit-frontrun
    kind: semantic
    pattern: |
      (function_definition
        (parameter
          (identifier) @sig)
        (function_body
          (statement
            (expression_statement
              (expression
                (call_expression
                  (expression
                    (member_expression
                      (identifier)
                      (identifier) @method)))))))) 
      (#match? @sig "^(v|r|s|signature|permit)$")
      (#eq? @method "permit")
    message: Permit signature without deadline check - vulnerable to front-running
    on_error: skip
    on_error: skip

