                    (identifier) @callback))))))
        (statement
          (expression_statement
            (expression
              (member_expression)))))
      (#match? @callback "^(callback|hook|onFlash)$")
    message: Callback with state read after - vulnerable to cross-contract reentrancy
    on_error: skip
    on_error: skip

