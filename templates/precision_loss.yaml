id: precision-loss
name: Critical Precision Loss
description: Only the most dangerous precision loss patterns from real exploits
severity: critical
tags:
  - arithmetic
  - precision
  - 0-day
patterns:
  - id: division-before-multiplication
    pattern: '(amount|balance|fee|reward|share)\s*\/\s*\w+\s*\*\s*\w+'
    message: Division before multiplication - precision loss (BalancerV2 $120M exploit)
  - id: unsafe-downcast
    pattern: 'uint128\([^)]{0,50}uint256'
    message: Unsafe uint256→uint128 downcast without overflow check
