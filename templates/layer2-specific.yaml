id: layer2-specific
name: Layer 2 Network Specific Vulnerabilities
description: |
  Vulnerabilities specific to L2 networks:
  - Arbitrum sequencer issues
  - Optimism L1 block differences
  - zkSync specific patterns
  - Cross-L2 replay
  - Bridge security
severity: high
tags:
  - L2
  - Arbitrum
  - Optimism
  - zkSync
  - Base
  - Blast

patterns:
  # Arbitrum: Missing sequencer check
  - id: arbitrum-sequencer-uptime
    kind: semantic
    pattern: |
      (member_expression
        property: (identifier) @method)
      (#eq? @method "latestRoundData")
    message: "Chainlink feed on L2 - add sequencer uptime check for Arbitrum/Optimism"

  # Arbitrum: Block number difference
  - id: arbitrum-block-number
    kind: semantic
    pattern: |
      (member_expression
        object: (identifier) @obj
        property: (identifier) @prop)
      (#eq? @obj "block")
      (#eq? @prop "number")
    message: "block.number on Arbitrum - updates faster than L1, verify timing assumptions"

  # Optimism: L1 block number
  - id: optimism-l1-block
    kind: regex
    pattern: 'L1Block\.(number|timestamp|basefee)'
    message: "Optimism L1Block access - verify this is intentional, not confused with L2 block"

  # Blast: Native yield handling
  - id: blast-native-yield
    kind: semantic
    pattern: |
      (member_expression
        property: (identifier) @method)
      (#match? @method "^(configureClaimableYield|configureClaimableGas|claimYield|claimAllGas)$")
    message: "Blast yield configuration - verify accounting handles yield accrual correctly"

  # Blast: Gas mode configuration
  - id: blast-gas-mode
    kind: semantic
    pattern: |
      (member_expression
        property: (identifier) @method)
      (#eq? @method "configureGovernor")
    message: "Blast governor configuration - critical access control, verify proper authorization"

  # zkSync: Native account abstraction
  - id: zksync-native-aa
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name)
      (#match? @name "^(validateTransaction|executeTransaction|payForTransaction)$")
    message: "zkSync AA function - verify system contract calls and validation logic"

  # zkSync: Contract deployer
  - id: zksync-deployer
    kind: semantic
    pattern: |
      (member_expression
        property: (identifier) @method)
      (#match? @method "^(create|create2|createAccount|create2Account)$")
    message: "zkSync deployment - bytecode hash differs from EVM, test deployment carefully"

  # L2: Aliased addresses from L1
  - id: l2-aliased-address
    kind: regex
    pattern: 'AddressAliasHelper|applyL1ToL2Alias|undoL1ToL2Alias'
    message: "L2 address aliasing - verify L1 msg.sender is correctly transformed"

  # Cross-L2: Missing chain ID
  - id: cross-l2-replay
    kind: regex
    pattern: 'keccak256\s*\(\s*abi\.(encode|encodePacked)\s*\((?![^)]*chainid)'
    message: "Message hash without chain ID - may be replayed across L2s sharing same address"

  # Bridge: L2 message verification
  - id: l2-bridge-verification
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (parameter))
      (#match? @name "^(onMessageReceived|handleMessage|processMessage|relayMessage)$")
    message: "L2 bridge message handler - verify msg.sender is the canonical bridge contract"

  # L2: Gas price differences
  - id: l2-gas-price
    kind: semantic
    pattern: |
      (member_expression
        object: (identifier) @obj
        property: (identifier) @prop)
      (#eq? @obj "tx")
      (#eq? @prop "gasprice")
    message: "tx.gasprice on L2 - behavior differs from L1, may be 0 or L2-specific"

  # L2: Forced transactions
  - id: l2-forced-inclusion
    kind: regex
    pattern: '(delayedInbox|forcedInclusion|forceInclusion)'
    message: "L2 forced inclusion - verify contract handles delayed/forced L1 transactions"

  # Base: Coinbase-specific
  - id: base-specific-patterns
    kind: semantic
    pattern: |
      (member_expression
        property: (identifier) @method)
      (#match? @method "^(registerCoinbaseWallet|coinbase)$")
    message: "Base-specific functionality - verify compatibility with Base chain"

  # L2: Timestamp reliability
  - id: l2-timestamp-reliability
    kind: semantic
    pattern: |
      (member_expression
        object: (identifier) @block
        property: (identifier) @prop)
      (#eq? @block "block")
      (#eq? @prop "timestamp")
    message: "block.timestamp on L2 - may update differently than L1, verify timing logic"
