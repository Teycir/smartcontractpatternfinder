id: semantic-vulnerabilities
name: Semantic Vulnerability Detection
description: AST-based detection of smart contract vulnerabilities using tree-sitter
severity: high
tags:
  - security
  - semantic
  - ast-analysis

patterns:
  - id: external-call-detection
    kind: semantic
    pattern: |
      (call_expression
        (expression
          (member_expression
            (identifier)
            (identifier) @method)))
      (#eq? @method "call")
    message: External call detected - potential reentrancy risk

  - id: delegatecall-usage
    kind: semantic
    pattern: |
      (call_expression
        (expression
          (member_expression
            (identifier)
            (identifier) @method)))
      (#eq? @method "delegatecall")
    message: Delegatecall usage detected - verify target contract safety

  - id: tx-origin-auth
    kind: semantic
    pattern: |
      (member_expression
        (identifier) @obj
        (identifier) @prop)
      (#eq? @obj "tx")
      (#eq? @prop "origin")
    message: tx.origin used for authentication - use msg.sender instead

  - id: selfdestruct-usage
    kind: semantic
    pattern: |
      (call_expression
        (expression
          (identifier) @func))
      (#eq? @func "selfdestruct")
    message: selfdestruct usage detected - ensure proper access control

  # Detects low-level calls without return value checks
  - id: unchecked-low-level-call
    kind: semantic
    validate: true
    pattern: |
      (expression_statement
        (expression
          (call_expression
            (expression
              (member_expression
                (identifier)
                (identifier) @method)))))
      (#match? @method "^(call|delegatecall|staticcall)$")
    message: Unchecked low-level call - verify return value is checked
    required: true
    fallback: regex
    on_error: skip
