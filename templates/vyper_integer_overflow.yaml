id: vyper-integer-overflow
name: Vyper Integer Overflow/Underflow
description: Detects unsafe arithmetic in Vyper contracts (pre-0.3.4 versions)
severity: medium
cache: true
tags:
  - vyper
  - integer-overflow
  - arithmetic
patterns:
  - id: unchecked-addition
    kind: regex
    validate: true
    pattern: '\w+\s*\+=\s*\w+'
    message: Unchecked addition - ensure Vyper version >= 0.3.4 for automatic overflow checks
    required: false
    fallback: regex
    on_error: skip

  - id: unchecked-multiplication
    kind: regex
    validate: true
    pattern: '\w+\s*\*=\s*\w+'
    message: Unchecked multiplication - verify overflow protection
    required: false
    fallback: regex
    on_error: skip

  - id: unsafe-cast
    kind: regex
    validate: true
    pattern: 'convert\(\w+,\s*uint\d+\)'
    message: Type conversion detected - verify bounds checking
    required: false
    fallback: regex
    on_error: skip
