id: integer-overflow-risk
name: Integer Overflow/Underflow Risk
description: |
  Arithmetic operations without validation (before Solidity 0.8.x) can overflow.
severity: high
tags:
  - security
  - overflow
  - SWC-101
patterns:
  # Precision loss - division truncates before multiplication amplifies the error
  - id: multiply-before-divide
    kind: semantic
    validate: true
    pattern: |
      (binary_expression
        left: (expression (binary_expression "/" @op_div))
        "*" @op_mul)
    message: "Division before multiplication causes precision loss - reorder to multiply first"
    required: true
    fallback: regex
    on_error: skip

  # Overflow risk - unchecked addition can wrap around in Solidity < 0.8.0
  - id: unchecked-addition-assignment
    kind: semantic
    validate: true
    pattern: |
      (augmented_assignment_expression
        left: (expression)
        "+=" @op
        right: (expression))
    message: "Unchecked addition (+=) - use SafeMath or Solidity >= 0.8.0 for overflow protection"
    required: false
    on_error: skip

  - id: unchecked-subtraction
    kind: semantic
    validate: true
    pattern: |
      (binary_expression
        "-" @op)
    message: "Subtraction operation check. Verify underflow protection."
    required: false
    fallback: regex
    on_error: skip

  - id: array-length-decrement
    kind: semantic
    validate: true
    pattern: |
      (update_expression
        argument: (expression (member_expression property: (identifier) @len (#eq? @len "length")))
        "--" @op)
    message: "Dangerous array length decrement."
    required: true
    fallback: regex
    on_error: skip
