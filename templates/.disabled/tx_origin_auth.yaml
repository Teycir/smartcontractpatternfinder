id: tx-origin-authentication
name: tx.origin Used for Authentication
description: |
  Using tx.origin for authentication is vulnerable to phishing attacks.
  An attacker can trick the owner into calling a malicious contract.
severity: high
tags:
  - security
  - tx-origin
  - SWC-115

patterns:
  - id: tx-origin-equals
    kind: semantic
    validate: true
    pattern: |
      (binary_expression
        (expression
          (member_expression
            (identifier) @_tx
            (identifier) @_origin)))
      (#eq? @_tx "tx")
      (#eq? @_origin "origin")
    message: "tx.origin used for authentication. Use msg.sender instead to prevent phishing."
    required: true
    fallback: regex
    on_error: skip

  - id: require-tx-origin
    kind: semantic
    pattern: |
      (call_expression
        (expression
          (identifier) @_func)
        (call_argument
          (expression
            (binary_expression
              (expression
                (member_expression
                  (identifier) @_tx
                  (identifier) @_origin))))))
      (#eq? @_func "require")
      (#eq? @_tx "tx")
      (#eq? @_origin "origin")
    message: "require(tx.origin == ...) is vulnerable to phishing. Use msg.sender for auth."

  - id: tx-origin-owner-check
    kind: semantic
    pattern: |
      (binary_expression
        (expression
          (member_expression
            (identifier) @_tx
            (identifier) @_origin))
        (expression
          (identifier) @_owner))
      (#eq? @_tx "tx")
      (#eq? @_origin "origin")
      (#match? @_owner "^(owner|admin|_owner)$")
    message: "tx.origin owner check is insecure. Replace with msg.sender == owner."
