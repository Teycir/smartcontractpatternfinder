id: weak-randomness-prevrandao-v2
version: "2.0.0"
name: "Weak Randomness via PREVRANDAO"
description: "Detects when block.prevrandao is used for randomness generation"
severity: medium
tags:
  - randomness
  - security
  - SWC-120

patterns:
  # Primary pattern: Match block.prevrandao NOT in comments
  - id: prevrandao-usage
    kind: regex
    pattern: '^(?!.*//.*block\.prevrandao).*\bblock\.prevrandao\b'
    message: |
      block.prevrandao used for randomness.
      
      PREVRANDAO is predictable by validators and should not be used for 
      security-critical randomness. Consider using Chainlink VRF or commit-reveal.

  # Exclude safe patterns
  - id: event-emission
    kind: regex
    pattern: 'emit\s+\w+\(.*block\.prevrandao'
    message: "Event emission for transparency (safe)"
    severity: info
    
  - id: logging
    kind: regex
    pattern: '(log|Log|LOG|console).*block\.prevrandao'
    message: "Debug logging (safe)"
    severity: info
