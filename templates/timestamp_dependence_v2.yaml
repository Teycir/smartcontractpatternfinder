id: timestamp-dependence-v2
name: Timestamp Dependence (Semantic)
description: |
  Usage of block.timestamp (or now) in control flow logic can be manipulated by miners.
severity: medium
tags:
  - security
  - timestamp
  - SWC-116
patterns:
  - id: timestamp-in-comparison
    kind: semantic
    pattern: |
      (binary_expression
        left: (expression [(identifier) (member_expression)] @time (#match? @time "^(now|block\.timestamp)$"))
        ["<" ">" "<=" ">=" "==" "!="] @op
        right: (expression))
    message: "Avoid using block.timestamp for logic or randomness. Miners can manipulate it."
