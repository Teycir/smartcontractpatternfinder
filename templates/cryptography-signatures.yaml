id: cryptography-signatures
name: Cryptography and Signature Security
description: |
  Detects cryptographic vulnerabilities:
  - Signature malleability
  - Replay attacks
  - Weak randomness
  - Hash collisions
  - Missing chain ID
severity: critical
tags:
  - cryptography
  - signatures
  - ECDSA
  - replay
  - randomness

patterns:
  # ECDSA signature malleability
  - id: signature-malleability
    kind: semantic
    pattern: |
      (identifier) @func
      (#eq? @func "ecrecover")
    message: "Raw ecrecover usage - vulnerable to signature malleability, use OpenZeppelin ECDSA"

  # Missing signature length check
  - id: signature-length-check
    kind: semantic
    pattern: |
      (function_definition
        (parameter
          (identifier) @name))
      (#match? @name "^(sig|signature)$")
    message: "Signature parameter - verify length is 65 bytes (or 64 for compact)"

  # Replay attack - missing nonce
  - id: replay-missing-nonce
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (parameter))
      (#match? @name "^(execute|verify|validate)WithSignature$")
    message: "Signature verification without visible nonce - vulnerable to replay attacks"

  # Replay attack - missing chain ID
  - id: replay-missing-chainid
    kind: regex
    pattern: 'keccak256\s*\(\s*abi\.(?:encode|encodePacked)\s*\((?![^)]{0,200}chainid)'
    message: "Hash without block.chainid - signature may be replayed on other chains"

  # Replay attack - missing contract address
  - id: replay-missing-address
    kind: regex
    pattern: 'keccak256\s*\(\s*abi\.(?:encode|encodePacked)\s*\((?![^)]{0,200}address\s*\(\s*this\s*\))'
    message: "Hash without address(this) - signature may be replayed on other contracts"

  # Weak randomness - block hash
  - id: weak-randomness-blockhash
    kind: semantic
    pattern: |
      (identifier) @func
      (#eq? @func "blockhash")
    message: "blockhash for randomness - only available for last 256 blocks, predictable"

  # Weak randomness - prevrandao
  - id: weak-randomness-prevrandao
    kind: semantic
    pattern: |
      (member_expression
        object: (identifier) @obj
        property: (identifier) @prop)
      (#eq? @obj "block")
      (#eq? @prop "prevrandao")
    message: "block.prevrandao (formerly difficulty) - can be biased by validators"

  # Missing deadline in signature
  - id: signature-missing-deadline
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (parameter))
      (#match? @name "^(permit|executeWithSig|metaTransaction)$")
    message: "Signature function without visible deadline parameter - signatures never expire"

  # Hash collision with encodePacked
  - id: encode-packed-collision
    kind: regex
    pattern: 'keccak256\s*\(\s*abi\.encodePacked\s*\([^)]{1,200},\s*[^)]{1,200},\s*[^)]{1,200}\)'
    message: "abi.encodePacked with multiple dynamic types - vulnerable to hash collision"

  # Signature verification return
  - id: signature-return-unchecked
    kind: semantic
    pattern: |
      (member_expression
        object: (identifier) @lib
        property: (identifier) @method)
      (#eq? @lib "ECDSA")
      (#eq? @method "recover")
    message: "ECDSA.recover return value not checked - verify recovered address matches expected"

  # EIP-712 domain separator cached
  - id: eip712-domain-cached
    kind: regex
    pattern: 'bytes32\s+immutable\s+\w{0,50}(DOMAIN_SEPARATOR|domainSeparator)\w{0,50}'
    message: "Immutable DOMAIN_SEPARATOR - won't update on chain fork, replay possible"

  # Commit-reveal missing delay
  - id: commit-reveal-no-delay
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (function_body))
      (#eq? @name "reveal")
    message: "Reveal function - ensure minimum delay between commit and reveal"

  # VRF callback manipulation
  - id: vrf-callback-manipulation
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (function_body))
      (#match? @name "^(fulfillRandomness|rawFulfillRandomWords|fulfillRandomWords)$")
    message: "VRF callback with state change - verify callback cannot be manipulated"
