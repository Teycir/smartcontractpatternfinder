id: advanced-audit-checks
name: Advanced Audit-Level Vulnerability Detection
description: |
  Deep semantic analysis to catch vulnerabilities auditors commonly miss:
  - Reentrancy patterns (state changes after external calls)
  - Unchecked return values from low-level calls
  - Access control issues on critical functions
  - Oracle manipulation and flash loan vulnerabilities
  - Timestamp dependence and front-running risks
severity: high
tags:
  - security
  - audit
  - advanced
  - semantic

patterns:
  # State changes after external calls (reentrancy)
  - id: state-after-call
    kind: semantic
    validate: true
    pattern: |
      (function_body
        (statement
          (expression_statement
            (expression
              (call_expression
                (expression
                  (member_expression
                    (identifier)
                    (identifier) @method))))))
        (statement
          (expression_statement
            (expression
              (assignment_expression)))))
      (#match? @method "^(call|transfer|send)$")
    message: State change after external call - potential reentrancy vulnerability
    required: true
    fallback: regex
    on_error: skip

  # Unchecked return values
  - id: unchecked-call-return
    kind: semantic
    validate: true
    pattern: |
      (expression_statement
        (expression
          (call_expression
            (expression
              (member_expression
                (identifier)
                (identifier) @method)))))
      (#match? @method "^(call|delegatecall|send)$")
    message: Unchecked low-level call return value - may silently fail
    required: true
    fallback: regex
    on_error: skip

  # Unsafe delegatecall with user input
  - id: delegatecall-user-input
    kind: semantic
    pattern: |
      (call_expression
        (expression
          (member_expression
            (identifier)
            (identifier) @method))
        (call_argument
          (expression
            (identifier) @arg)))
      (#eq? @method "delegatecall")
      (#match? @arg "^(msg|_|data|input|calldata)")
    message: Delegatecall with potential user-controlled input - critical vulnerability

  # Missing zero address check
  - id: missing-zero-check
    kind: semantic
    pattern: |
      (function_definition
        (parameter
          (type_name) @type)
        (function_body
          (statement
            (expression_statement
              (expression
                (assignment_expression
                  (expression
                    (member_expression))
                  (expression
                    (identifier))))))))
      (#eq? @type "address")
    message: Address parameter assigned without zero-address validation

  # Integer overflow in multiplication before division
  - id: overflow-mul-div
    kind: semantic
    pattern: |
      (binary_expression
        (expression
          (binary_expression))
        (expression
          (identifier)))
    message: Multiplication before division - potential overflow, use SafeMath or Solidity 0.8+

  # Timestamp dependence
  - id: timestamp-dependence
    kind: semantic
    pattern: |
      (binary_expression
        (expression
          (member_expression
            (identifier) @obj
            (identifier) @prop)))
      (#eq? @obj "block")
      (#eq? @prop "timestamp")
    message: Block timestamp used in logic - miners can manipulate within ~15 seconds

  # Unprotected selfdestruct
  - id: unprotected-selfdestruct
    kind: semantic
    pattern: |
      (function_definition
        (visibility) @vis
        (function_body
          (statement
            (expression_statement
              (expression
                (call_expression
                  (expression
                    (identifier) @func)))))))
      (#match? @vis "^(public|external)$")
      (#eq? @func "selfdestruct")
    message: Selfdestruct without access control - verify proper protection

  # Ether locked forever (no withdraw function)
  - id: payable-no-withdraw
    kind: semantic
    pattern: |
      (function_definition
        (state_mutability) @mut)
      (#eq? @mut "payable")
    message: Payable function detected - ensure withdrawal mechanism exists

  # Front-running vulnerable patterns
  - id: frontrun-vulnerable
    kind: semantic
    pattern: |
      (function_definition
        (visibility) @vis
        (function_body
          (statement
            (expression_statement
              (expression
                (assignment_expression
                  (expression
                    (member_expression))
                  (expression
                    (member_expression
                      (identifier) @msg
                      (identifier) @val))))))))
      (#match? @vis "^(public|external)$")
      (#eq? @msg "msg")
      (#eq? @val "value")
    message: Public function with msg.value assignment - vulnerable to front-running

  # Dangerous strict equality with balance
  - id: strict-balance-equality
    kind: semantic
    pattern: |
      (binary_expression
        (expression
          (member_expression
            (identifier)
            (identifier) @prop)))
      (#eq? @prop "balance")
    message: Strict equality with balance - use >= instead, balance can be forced

  # Missing event emission
  - id: state-change-no-event
    kind: semantic
    validate: true
    pattern: |
      (function_definition
        (visibility) @vis
        (function_body
          (statement
            (expression_statement
              (expression
                (assignment_expression
                  (expression
                    (member_expression))))))))
      (#match? @vis "^(public|external)$")
    message: State change in public function without event emission
    required: false
    fallback: regex
    on_error: skip
    cache: true

  # Shadowing state variables
  - id: variable-shadowing
    kind: semantic
    validate: true
    pattern: |
      (function_definition
        (parameter
          (identifier) @param))
    message: Parameter may shadow state variable - verify no naming conflicts
    required: false
    fallback: regex
    on_error: skip
    cache: true

  # Uninitialized storage pointer
  - id: uninitialized-storage
    kind: regex
    validate: true
    pattern: '\w+\[\]\s+storage\s+\w+\s*;'
    message: Storage pointer without initialization - points to slot 0
    required: false
    on_error: skip

  # Reentrancy via modifier
  - id: modifier-external-call
    kind: semantic
    pattern: |
      (modifier_definition
        (function_body
          (statement
            (expression_statement
              (expression
                (call_expression
                  (expression
                    (member_expression
                      (identifier)
                      (identifier) @method)))))))) 
      (#match? @method "^(call|transfer|send)$")
    message: External call in modifier - can enable reentrancy attacks

  # DoS with block gas limit
  - id: unbounded-loop
    kind: semantic
    pattern: |
      (for_statement
        (statement
          (expression_statement
            (expression
              (call_expression)))))
    message: Loop with external calls - vulnerable to DoS via block gas limit

  # Access control on critical functions
  - id: missing-access-control
    kind: semantic
    pattern: |
      (function_definition
        (identifier) @name
        (visibility) @vis)
      (#match? @name "^(withdraw|transfer|mint|burn|destroy|kill|pause|unpause|upgrade)$")
      (#match? @vis "^(public|external)$")
    message: Critical function without visible access control modifier

  # Signature replay attacks
  - id: missing-nonce
    kind: semantic
    pattern: |
      (function_definition
        (parameter
          (type_name) @type
          (identifier) @name))
      (#match? @type "^(bytes|bytes32)$")
      (#match? @name "^(sig|signature)$")
    message: Signature parameter without nonce - vulnerable to replay attacks

  # Price oracle manipulation
  - id: single-source-price
    kind: semantic
    pattern: |
      (call_expression
        (expression
          (member_expression
            (identifier)
            (identifier) @method)))
      (#match? @method "^(getPrice|price|getReserves)$")
    message: Single price source - vulnerable to oracle manipulation, use TWAP or multiple sources

  # Flash loan attack surface
  - id: flash-loan-vulnerable
    kind: semantic
    validate: true
    pattern: |
      (function_definition
        (visibility) @vis
        (function_body
          (statement
            (expression_statement
              (expression
                (binary_expression
                  (expression
                    (member_expression
                      (identifier)
                      (identifier) @prop))))))))
      (#match? @vis "^(public|external)$")
      (#eq? @prop "balance")
    message: Balance-dependent logic in public function - vulnerable to flash loan attacks
    required: true
    fallback: regex
    on_error: skip

  # Centralization risk
  - id: owner-single-point
    kind: semantic
    validate: true
    pattern: |
      (modifier_invocation
        (identifier) @mod)
      (#match? @mod "^(onlyOwner|onlyAdmin)$")
    message: Single owner/admin control - consider multi-sig or timelock for decentralization
    required: false
    fallback: regex
    on_error: skip
