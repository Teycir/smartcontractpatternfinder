id: signature-return-unchecked-v2
name: Unchecked Signature Recovery
description: ecrecover/ECDSA.recover calls
severity: high
tags:
  - security
  - signatures
patterns:
  - id: ecrecover-call
    pattern: 'ecrecover\s*\('
    message: ecrecover call - verify return is not address(0)
  - id: ecdsa-recover-call
    pattern: 'ECDSA\.recover\s*\('
    message: ECDSA.recover call - verify return value
