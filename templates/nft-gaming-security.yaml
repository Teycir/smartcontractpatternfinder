id: nft-gaming-security
name: NFT and Gaming Contract Security
description: |
  Vulnerabilities specific to NFTs and blockchain games:
  - Metadata manipulation
  - Royalty bypass
  - Game randomness exploitation
  - Rarity manipulation
  - Lazy minting issues
severity: high
tags:
  - NFT
  - gaming
  - ERC721
  - ERC1155
  - randomness
  - metadata

patterns:
  # On-chain randomness for rarity
  - id: onchain-rarity-randomness
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (function_body))
      (#match? @name "^(mint|reveal|generateRarity)$")
    message: "On-chain randomness for NFT rarity - predictable, use Chainlink VRF"

  # Block-based reveal manipulation
  - id: reveal-block-manipulation
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (function_body))
      (#eq? @name "reveal")
    message: "Blockhash for reveal - miners can manipulate, use commit-reveal with VRF"

  # Metadata URI manipulation
  - id: metadata-uri-mutable
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name)
      (#match? @name "^(setBaseURI|setTokenURI|updateMetadata)$")
    message: "Mutable metadata URI - verify proper access control, consider freezing after reveal"

  # Royalty bypass check
  - id: royalty-bypass
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (function_body))
      (#eq? @name "transferFrom")
    message: "NFT transfer - EIP-2981 royalties are not enforced on-chain, marketplaces may bypass"

  # Lazy minting signature replay
  - id: lazy-mint-replay
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (parameter))
      (#match? @name "^(lazyMint|mintWithSignature|redeemVoucher)$")
    message: "Lazy minting - ensure voucher cannot be replayed, include nonce and deadline"

  # Free minting without limit
  - id: unlimited-free-mint
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (function_body))
      (#match? @name "^(freeMint|claimFree|mintFree)$")
    message: "Free mint function - verify per-wallet limit and total cap"

  # Reveal before all minted
  - id: premature-reveal
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (function_body))
      (#eq? @name "reveal")
    message: "Reveal function - verify all tokens minted before reveal to prevent sniping"

  # Gaming: Score manipulation
  - id: game-score-manipulation
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (parameter))
      (#match? @name "^(submitScore|updateScore|recordWin)$")
    message: "Game score submission - verify authenticated with signature, not directly settable"

  # Gaming: Outcome determined by player
  - id: player-determined-outcome
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (parameter))
      (#match? @name "^(battle|fight|play|roll)$")
    message: "Game outcome with player input - input should not determine random outcomes"

  # Soulbound transfer bypass
  - id: soulbound-transfer-bypass
    kind: regex
    pattern: 'function\s+transfer[^{]*\{[^}]*_burn[^}]*_mint'
    message: "Soulbound token - verify cannot bypass via burn+mint to new address"

  # Gaming: Time-based randomness
  - id: game-time-randomness
    kind: regex
    pattern: 'keccak256\s*\([^)]*block\.timestamp'
    message: "Timestamp in game randomness - manipulable by validators, use VRF"

  # Whitelist merkle proof reuse
  - id: merkle-proof-reuse
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (parameter))
      (#match? @name "^(whitelistMint|presaleMint|allowlistMint)$")
    message: "Merkle proof minting - verify proof cannot be reused (use claimed mapping)"

  # ERC1155 gaming balance manipulation
  - id: erc1155-balance-manipulation
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (modifier_invocation))
      (#match? @name "^(craft|combine|merge|upgrade)$")
    message: "ERC1155 crafting function - verify balances checked and burned atomically"
