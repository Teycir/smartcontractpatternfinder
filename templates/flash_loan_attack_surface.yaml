id: flash-loan-attack-surface
name: Flash Loan Attack Surface Detection
description: |
  Detects contracts vulnerable to flash loan attacks through price manipulation,
  oracle manipulation, and single-transaction exploits.
  Targets: AMMs, lending protocols, yield farms, staking contracts.
severity: critical
tags:
  - flash-loan
  - price-manipulation
  - oracle
  - defi
  - attack-surface

patterns:
  # === PRICE ORACLE VULNERABILITIES ===

  - id: spot-price-without-twap
    kind: regex
    pattern: '^\s*function\s+\w+[^}]{0,500}(?:getReserves|balanceOf)\s*\([^}]{0,500}(?:price|rate|value)\s*='
    message: Uses spot price without TWAP - vulnerable to flash loan price manipulation

  - id: single-dex-price-source
    kind: regex
    pattern: '^\s*function\s+\w+[^}]{0,500}IUniswapV2Pair[^}]{0,500}getReserves[^}]{0,500}(?!.*(?:chainlink|twap|average|median))'
    message: Single DEX as price source - flash loan can manipulate reserves

  - id: balance-based-pricing
    kind: regex
    pattern: '^\s*function\s+(?:getPrice|calculatePrice|getRate)[^}]{0,500}balanceOf\s*\([^}]{0,500}(?!.*(?:twap|oracle|chainlink))'
    message: Price calculation based on token balance - flash loan manipulable

  - id: reserve-ratio-pricing
    kind: regex
    pattern: '^\s*function\s+\w+[^}]{0,500}(?:reserve0|reserve1)[^}]{0,500}\/[^}]{0,500}(?:reserve1|reserve0)'
    message: Direct reserve ratio for pricing - vulnerable to flash loan manipulation

  # === VULNERABLE CALCULATION PATTERNS ===

  - id: collateral-value-spot-price
    kind: regex
    pattern: '^\s*function\s+(?:getCollateralValue|calculateCollateral|borrowLimit)[^}]{0,500}(?:getReserves|balanceOf)[^}]{0,500}(?!.*(?:oracle|twap|chainlink))'
    message: Collateral valuation using spot price - flash loan can inflate value

  - id: liquidation-spot-price
    kind: regex
    pattern: '^\s*function\s+(?:liquidate|canLiquidate|isLiquidatable)[^}]{0,500}(?:getReserves|balanceOf)[^}]{0,500}(?!.*(?:oracle|twap))'
    message: Liquidation check using spot price - flash loan can trigger false liquidations

  - id: reward-calculation-manipulable
    kind: regex
    pattern: '^\s*function\s+(?:getReward|calculateReward|claimReward)[^}]{0,500}balanceOf\s*\([^}]{0,500}(?!.*(?:snapshot|checkpoint|locked))'
    message: Reward calculation based on current balance - flash loan can inflate rewards

  - id: share-price-manipulable
    kind: regex
    pattern: '^\s*function\s+(?:deposit|mint|withdraw)[^}]{0,500}totalSupply\s*\([^}]{0,500}balanceOf[^}]{0,500}(?!.*(?:before|snapshot))'
    message: Share price calculation vulnerable to balance manipulation

  # === MISSING FLASH LOAN PROTECTION ===

  - id: deposit-withdraw-same-block
    kind: regex
    pattern: '^\s*function\s+(?:deposit|stake|mint)\s*\([^}]{0,500}(?!.*(?:block\.number|block\.timestamp|lastDeposit|depositBlock))'
    message: Deposit without same-block withdrawal protection - flash loan attack vector

  - id: no-withdrawal-delay
    kind: regex
    pattern: '^\s*function\s+(?:withdraw|unstake|redeem)\s*\([^}]{0,500}(?!.*(?:require.*block|lockTime|withdrawDelay|cooldown))'
    message: Instant withdrawal without delay - enables flash loan attacks

  - id: borrow-repay-same-tx
    kind: regex
    pattern: '^\s*function\s+(?:borrow|loan)\s*\([^}]{0,500}(?!.*(?:block\.number|timestamp|borrowBlock))'
    message: Borrow without same-transaction protection - flash loan arbitrage risk

  # === VULNERABLE AMM PATTERNS ===

  - id: swap-without-slippage
    kind: regex
    pattern: '^\s*function\s+swap[^}]{0,500}(?!.*(?:amountOutMin|minReturn|slippage))'
    message: Swap without slippage protection - vulnerable to sandwich + flash loan

  - id: add-liquidity-no-price-check
    kind: regex
    pattern: '^\s*function\s+(?:addLiquidity|mint)\s*\([^}]{0,500}(?!.*(?:price|ratio|reserve).*require)'
    message: Add liquidity without price validation - flash loan can manipulate ratio

  - id: remove-liquidity-no-check
    kind: regex
    pattern: '^\s*function\s+(?:removeLiquidity|burn)\s*\([^}]{0,500}(?!.*(?:amountMin|minAmount))'
    message: Remove liquidity without minimum amount check - flash loan drain risk

  # === ORACLE MANIPULATION ===

  - id: custom-oracle-no-validation
    kind: regex
    pattern: '^\s*function\s+(?:updatePrice|setPrice|updateOracle)\s*\([^}]{0,500}(?!.*(?:require|assert|onlyOwner|onlyOracle))'
    message: Oracle update without validation - flash loan can manipulate price feed

  - id: oracle-single-source
    kind: regex
    pattern: '^\s*function\s+\w+[^}]{0,500}oracle\.(?:getPrice|latestAnswer)[^}]{0,500}(?!.*(?:backup|fallback|secondary))'
    message: Single oracle source without fallback - flash loan can exploit oracle failure

  # === REENTRANCY + FLASH LOAN ===

  - id: external-call-before-balance-update
    kind: regex
    pattern: '^\s*function\s+(?:withdraw|claim|redeem)[^}]{0,500}\.call[^}]{0,500}(?:balances\[|_balances\[|balance\s*=)'
    message: External call before balance update - reentrancy + flash loan combo attack

  - id: callback-no-state-check
    kind: regex
    pattern: '^\s*function\s+\w+Callback[^}]{0,500}(?!.*(?:require.*msg\.sender|require.*initiator))'
    message: Callback without state validation - flash loan callback manipulation
