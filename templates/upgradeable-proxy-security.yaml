id: upgradeable-proxy-security
name: Upgradeable Contract & Proxy Security
description: |
  Detects vulnerabilities in upgradeable contracts and proxy patterns:
  - Storage collision between proxy and implementation
  - Uninitialized implementation contracts
  - Selfdestruct in implementation
  - Function selector clashing
  - Missing upgrade authorization
severity: critical
tags:
  - proxy
  - upgradeable
  - storage
  - UUPS
  - transparent-proxy

patterns:
  # Uninitialized implementation - can be taken over
  - id: uninitialized-implementation
    kind: semantic
    validate: true
    pattern: |
      (contract_declaration
        (identifier) @name
        (inheritance_specifier
          (user_defined_type
            (identifier) @parent)))
      (#match? @parent "^(Initializable|UUPSUpgradeable|TransparentUpgradeableProxy)$")
    message: "Upgradeable contract - ensure initialize() is called and protected with initializer modifier"
    required: false
    on_error: skip

  # Missing initializer modifier
  - id: missing-initializer-modifier
    kind: semantic
    validate: true
    pattern: |
      (function_definition
        name: (identifier) @name
        (parameter)
        (function_body))
      (#match? @name "^(initialize|init|setup)$")
    message: "Initialization function without initializer modifier - can be called multiple times"
    required: false
    on_error: skip

  # Constructor in upgradeable contract
  - id: constructor-in-upgradeable
    kind: regex
    pattern: 'constructor\s*\([^)]*\)'
    message: "Constructor in upgradeable contract - state set here won't exist in proxy context"

  # Selfdestruct in implementation
  - id: selfdestruct-in-implementation
    kind: regex
    pattern: 'selfdestruct\s*\('
    message: "CRITICAL: selfdestruct in implementation - can destroy proxy's delegatecall target"

  # Storage gap missing
  - id: missing-storage-gap
    kind: regex
    validate: true
    pattern: 'contract\s+\w+\s+is\s+[^{]{0,200}Upgradeable[^{]{0,100}\{(?![^}]{0,2000}__gap)'
    message: "Upgradeable contract without __gap - future storage variables may collide"
    required: false
    on_error: skip

  # Immutable in upgradeable
  - id: immutable-in-upgradeable
    kind: regex
    validate: true
    pattern: 'immutable\s+\w+'
    message: "Immutable variable in upgradeable contract - value set in constructor won't be available"
    required: false
    on_error: skip

  # UUPS missing _authorizeUpgrade
  - id: uups-missing-authorize
    kind: regex
    validate: true
    pattern: 'is\s+UUPSUpgradeable[^{]{0,200}\{(?![^}]{0,1000}_authorizeUpgrade)'
    message: "UUPS contract without _authorizeUpgrade - upgrade authorization missing"
    required: false
    on_error: skip

  # Delegatecall to user input
  - id: proxy-delegatecall-injection
    kind: semantic
    pattern: |
      (member_expression
        property: (identifier) @method)
      (#eq? @method "delegatecall")
    message: "Delegatecall detected - verify target cannot be controlled by attacker"

  # Function selector collision
  - id: function-selector-collision
    kind: regex
    validate: true
    pattern: '(fallback|receive)\s*\([^)]{0,100}\)\s*(external|public)[^{]{0,100}\{[^}]{0,500}delegatecall'
    message: "Proxy fallback with delegatecall - check for function selector collisions with proxy admin functions"
    required: false
    on_error: skip

  # Transparent proxy admin functions
  - id: transparent-proxy-admin
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (modifier_invocation
          (identifier) @mod))
      (#match? @name "^(upgradeTo|upgradeToAndCall|changeAdmin)$")
      (#match? @mod "^(ifAdmin|onlyProxyAdmin)$")
    message: "Proxy admin function - ensure admin cannot be set to zero address"

  # EIP-1967 slot usage
  - id: eip1967-storage-slot
    kind: regex
    pattern: 'bytes32\s+(private\s+)?constant\s+\w+\s*=\s*(0x360894|0xb53127|0x7050c9)'
    message: "EIP-1967 storage slot detected - verify correct slot for implementation/admin/beacon"

  # Initializer reentrancy
  - id: initializer-reentrancy
    kind: regex
    validate: true
    pattern: 'function\s+(initialize|init)\s*\([^)]{0,200}\)[^{]{0,100}\{[^}]{0,500}(call|delegatecall)\s*\('
    message: "External call in initializer - potential reentrancy during initialization"
    required: false
    on_error: skip
