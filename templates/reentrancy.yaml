id: reentrancy-basic
name: Reentrancy - External Call with Value
description: Detects external calls with value transfer that lack reentrancy protection
severity: high
tags:
  - security
  - reentrancy
  - SWC-107
patterns:
  # Only flag .call{value:} - delegatecall is separate template
  - id: external-call-with-value
    kind: regex
    pattern: '\.call\{value:'
    message: External call with value - verify reentrancy protection
