id: denial-of-service
name: Denial of Service Vulnerabilities
description: |
  Detects DoS vectors:
  - Block gas limit issues
  - Griefing attacks
  - Unbounded operations
  - External call failures
  - Resource exhaustion
severity: high
tags:
  - DoS
  - griefing
  - gas
  - availability

patterns:
  # Push to unbounded array
  - id: unbounded-array-push
    kind: semantic
    pattern: |
      (member_expression
        property: (identifier) @method)
      (#eq? @method "push")
    message: "Unbounded array push - iteration may exceed block gas limit"

  # Array iteration without limit
  - id: array-iteration-unbounded
    kind: regex
    pattern: 'for\s*\([^)]{1,200}\.length[^)]{0,100}\)'
    message: "Full array iteration - add pagination or max iteration limit"

  # External call in loop
  - id: loop-external-call
    kind: regex
    validate: true
    pattern: 'for\s*\([^)]{1,200}\)[^{]{0,100}\{[^}]{0,500}(call|transfer|send|delegatecall)\s*\('
    message: "External call in loop - single failure can DoS entire function"
    required: false
    on_error: skip

  # Revert in loop
  - id: revert-in-loop
    kind: regex
    validate: true
    pattern: 'for\s*\([^)]{1,200}\)[^{]{0,100}\{[^}]{0,500}(require|revert|assert)\s*\('
    message: "Revert inside loop - consider try/catch or continue on failure"
    required: false
    on_error: skip

  # Ether transfer to contract
  - id: dos-ether-transfer
    kind: semantic
    pattern: |
      (member_expression
        property: (identifier) @method)
      (#match? @method "^(transfer|send)$")
    message: "Ether transfer to address - receiving contract can revert and DoS sender"

  # Block gas limit in constructor
  - id: constructor-gas-limit
    kind: regex
    validate: true
    pattern: 'constructor\s*\([^)]{0,200}\)[^{]{0,100}\{[^}]{0,1000}for\s*\('
    message: "Loop in constructor - deployment may fail if array too large"
    required: false
    on_error: skip

  # Griefing via selfdestruct
  - id: griefing-selfdestruct
    kind: semantic
    pattern: |
      (member_expression
        property: (identifier) @balance)
      (#eq? @balance "balance")
    message: "Balance check can be griefed via selfdestruct - attacker can force-send ETH"

  # Return bomb attack
  - id: return-bomb
    kind: semantic
    pattern: |
      (member_expression
        property: (identifier) @method)
      (#eq? @method "call")
    message: "Low-level call with unbounded return data - vulnerable to return bomb DoS"

  # Delete from mapping in loop
  - id: delete-mapping-loop
    kind: regex
    validate: true
    pattern: 'for\s*\([^)]{1,200}\)[^{]{0,100}\{[^}]{0,500}delete\s+'
    message: "Deleting in loop - consider alternative data structure or lazy deletion"
    required: false
    on_error: skip

  # Minimum balance check
  - id: dos-minimum-balance
    kind: regex
    pattern: 'require\s*\([^)]*\.balance\s*[><=]'
    message: "Balance requirement - user can be DoS'd if balance drops below threshold"

  # String concatenation in loop
  - id: string-concat-loop
    kind: regex
    pattern: 'for\s*\([^)]+\)[^{]*\{[^}]*\.concat\s*\('
    message: "String concatenation in loop - O(n²) gas cost, may exceed block limit"

  # Vulnerable to block stuffing
  - id: block-stuffing-vulnerable
    kind: semantic
    pattern: |
      (member_expression
        object: (identifier) @block
        property: (identifier) @prop)
      (#eq? @block "block")
      (#match? @prop "^(timestamp|number)$")
    message: "Block-dependent timing - attacker can stuff blocks to manipulate deadline"

  # Pull over push pattern missing
  - id: push-payment-pattern
    kind: regex
    pattern: 'for\s*\([^)]+\)[^{]*\{[^}]*\.transfer\s*\('
    message: "Push payments in loop - use pull pattern (let users withdraw) instead"
