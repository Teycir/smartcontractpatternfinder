id: front-running-v2
name: Critical Front-Running
description: Only the most dangerous MEV patterns
severity: high
tags:
  - front-running
  - MEV
patterns:
  - id: block-randomness
    pattern: '(?:keccak256|sha256)\s*\(\s*abi\.(?:encode|encodePacked)\s*\([^)]{0,100}block\.(?:timestamp|number|difficulty|prevrandao)'
    message: Block properties used for randomness - predictable and manipulable
