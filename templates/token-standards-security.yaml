id: token-standards-security
name: ERC Token Standard Implementation Security
description: |
  Detects implementation issues in ERC20/721/1155/777 tokens:
  - Missing return values
  - Approval race conditions
  - Transfer hooks exploitation
  - Metadata manipulation
  - Supply manipulation
severity: high
tags:
  - ERC20
  - ERC721
  - ERC1155
  - ERC777
  - tokens

patterns:
  # ERC20: Missing return value
  - id: erc20-missing-return
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (parameter)
        (function_body))
      (#match? @name "^(transfer|transferFrom|approve)$")
    message: "ERC20 function may not return bool - some integrations expect return value"

  # ERC20: Approval to zero not clearing
  - id: erc20-approve-zero-check
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (parameter))
      (#eq? @name "approve")
    message: "ERC20 approve - verify handles approve(spender, 0) correctly before new approval"

  # ERC20: Double-spend on approve
  - id: erc20-approve-race
    kind: regex
    pattern: 'function\s+approve\s*\([^)]+\)[^{]*\{(?![^}]*(require|assert)[^}]*allowance)'
    message: "ERC20 approve without current allowance check - vulnerable to double-spend race condition"

  # ERC20: Fee-on-transfer not handled
  - id: fee-on-transfer-token
    kind: semantic
    pattern: |
      (member_expression
        property: (identifier) @method)
      (#eq? @method "transferFrom")
    message: "Token transferFrom - verify contract handles fee-on-transfer/rebasing tokens correctly"

  # ERC20: Infinite approval
  - id: erc20-infinite-approval
    kind: semantic
    pattern: |
      (member_expression
        property: (identifier) @method)
      (#eq? @method "approve")
    message: "Infinite token approval (type(uint256).max) - user funds at risk if contract compromised"

  # ERC721: Missing onERC721Received check
  - id: erc721-safe-mint-check
    kind: semantic
    pattern: |
      (identifier) @mint
      (#eq? @mint "_mint")
    message: "Using _mint instead of _safeMint - receiver contract may not handle NFT"

  # ERC721: tokenURI manipulation
  - id: erc721-tokenuri-injection
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (function_body))
      (#eq? @name "tokenURI")
    message: "tokenURI using abi.encodePacked with user input - potential injection vulnerability"

  # ERC721: Reentrancy in safeTransfer
  - id: erc721-safe-transfer-reentrancy
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (function_body))
      (#match? @name "^(safeTransferFrom|_safeTransfer)$")
    message: "State change after safeTransfer - onERC721Received callback enables reentrancy"

  # ERC1155: Missing batch callback
  - id: erc1155-batch-callback
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name)
      (#match? @name "^(safeBatchTransferFrom|_mintBatch|_burnBatch)$")
    message: "ERC1155 batch operation - ensure onERC1155BatchReceived is called for contracts"

  # ERC777: Hooks not disabled
  - id: erc777-hooks-enabled
    kind: semantic
    pattern: |
      (member_expression
        property: (identifier) @method)
      (#eq? @method "setInterfaceImplementer")
    message: "ERC777 interface registration - verify hooks cannot be exploited for reentrancy"

  # Rebasing token handling
  - id: rebasing-token-balance
    kind: regex
    pattern: '(uint256|uint)\s+(balance|amount|deposit|stake)'
    message: "Stored balance variable - may desync if token is rebasing (stETH, AMPL)"

  # Missing totalSupply check
  - id: token-supply-overflow
    kind: semantic
    pattern: |
      (function_definition
        name: (identifier) @name
        (function_body))
      (#match? @name "^(mint|_mint)$")
    message: "Minting without supply cap check - verify totalSupply cannot overflow"

  # Non-standard decimals
  - id: token-decimals-assumption
    kind: regex
    pattern: '(1e18|10\s*\*\*\s*18|1000000000000000000)'
    message: "Hardcoded 18 decimals - some tokens use different decimals (USDC=6, WBTC=8)"
