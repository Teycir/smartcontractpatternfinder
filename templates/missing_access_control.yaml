id: missing-access-control
name: Missing Access Control
description: Critical functions without access control modifiers
severity: critical
tags:
  - security
  - access-control
  - SWC-105
patterns:
  - id: critical-function-no-modifier
    kind: fancy-regex
    pattern: 'function\s+(?:withdraw|mint|setOwner|transferOwnership|upgrade|initialize)\s*\([^)]*\)\s+(?:public|external)(?!.{0,200}(?:onlyOwner|onlyRole|onlyAdmin|require\s*\(msg\.sender|if\s*\(msg\.sender))'
    message: Critical function without access control modifier or inline check
