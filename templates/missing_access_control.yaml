id: missing-access-control
name: Missing Access Control for Critical Functions
description: |
  Critical functions (like withdraw, mint, owner change) should have access control modifiers.
severity: high
tags:
  - security
  - access-control
  - SWC-105

patterns:
  # Critical functions without access control - allows unauthorized state changes
  - id: critical-function-no-auth
    kind: semantic
    validate: true
    pattern: |
      (function_definition
        (identifier) @func_name
        (visibility) @vis)
      (#match? @func_name "^(withdraw|mint|burn|setOwner|transferOwnership)$")
      (#match? @vis "^(public|external)$")
    message: "Critical function without access control - add onlyOwner or equivalent modifier to prevent unauthorized access"
    required: true
    fallback: regex
    on_error: skip
