id: missing-access-control
name: Missing Access Control
description: Critical functions without access control modifiers
severity: critical
tags:
  - security
  - access-control
  - SWC-105
patterns:
  - id: critical-function-no-modifier
    kind: regex
    pattern: 'function\s+(?:withdraw|mint|setOwner|transferOwnership|upgrade|initialize)\s*\([^)]*\)\s+(?:public|external)(?!.{0,1000}(?:onlyOwner|onlyRole|onlyAdmin))'
    message: Critical function without access control modifier
