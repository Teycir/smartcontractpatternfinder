id: strict-balance-equality-v2
name: Strict Balance Equality (Semantic)
description: |
  Using strict equality (==) with contract balance is dangerous as forcible sending of ether
  can break the logic.
severity: medium
tags:
  - security
  - logic
  - SWC-132
patterns:
  - id: this-balance-equality
    kind: semantic
    pattern: |
      (binary_expression
        left: (expression 
          (member_expression
            object: (expression (type_cast_expression 
              type: (primitive_type) @_addr (#eq? @_addr "address")
              (call_argument (expression (identifier) @_this (#eq? @_this "this")))))
            property: (identifier) @_bal (#eq? @_bal "balance")))
        "==" @op)
    message: "Avoid strict balance equality checks. Use >= or <= instead."

  - id: balance-equals-zero
    kind: semantic
    pattern: |
      (binary_expression
        left: (expression 
             (member_expression
                property: (identifier) @_bal (#eq? @_bal "balance")))
        "==" @op
        right: (expression (number_literal) @_zero (#eq? @_zero "0")))
    message: "Checking if balance is 0 using strict equality is risky."

  - id: require-exact-balance
    kind: semantic
    pattern: |
      (call_expression
        function: (expression (identifier) @_req (#eq? @_req "require"))
        (call_argument
          (expression
            (binary_expression
              left: (expression (member_expression property: (identifier) @_bal (#eq? @_bal "balance")))
              "==" @op))))
    message: "Using require with strict balance equality."

  - id: assert-balance
    kind: semantic
    pattern: |
      (call_expression
        function: (expression (identifier) @_assert (#eq? @_assert "assert"))
        (call_argument
          (expression
            (binary_expression
              left: (expression (member_expression property: (identifier) @_bal (#eq? @_bal "balance")))
              "==" @op))))
    message: "Using assert with strict balance equality."
